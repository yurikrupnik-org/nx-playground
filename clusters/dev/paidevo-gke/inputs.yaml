org: paidevo
clusterName: paidevo-cluster
clusterProvider: gke
clusterType: workload
environment: dev
gcpProject: bootstrap-491220
gcpSmSecretName: manager-secrets
# GKE native Workload Identity — no WIF pool / OIDC bucket needed
gkeLocation: me-west1
domain: yurikrupnik.com # TODO change back to paidevo.com
gatewayMode: platform
gatewaySuffix: platform.yurikrupnik.com # TODO change back to platform.paidevo.com
ingressClass: istio
ingressEnabled: true
tlsEnabled: true
# Let's Encrypt account email — required for ACME registration
acmeEmail: slava@yurikrupnik.com
githubAccount: yurikrupnik-org
githubRepo: nx-playground
githubBranch: clusters
githubPersonal: false
githubAuth: pat
workloads:
  - name: external-secrets
    namespace: external-secrets
    # KSA name MUST match what Pulumi GkeWorkloads bound:
    # platformWorkloads.kubernetesServiceAccount = 'external-secrets'
    ksa: external-secrets
    clouds:
      gcp:
        gsaEmail: external-secrets@bootstrap-491220.iam.gserviceaccount.com
  - name: crossplane
    namespace: crossplane-system
    # Matches Pulumi: kubernetesServiceAccount = 'crossplane-gcp-provider'
    ksa: crossplane-gcp-provider
    clouds:
      gcp:
        gsaEmail: crossplane-controller@bootstrap-491220.iam.gserviceaccount.com
