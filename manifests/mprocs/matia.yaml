# Matia development workflow
# Usage: mprocs -c manifests/mprocs/matia.yaml

procs:
  # =============================================================================
  # Frontend
  # =============================================================================
  matia-web:
    shell: "bun nx dev matia-web"
    stop: "SIGTERM"

  # =============================================================================
  # Backend (future: matia API crate)
  # =============================================================================
  matia-api:
     shell: "DATABASE_URL='postgres://myuser:mypassword@localhost:5432/mydatabase' bacon matia-api"
     stop: "SIGTERM"
     autostart: false
