apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crossplane
  namespace: crossplane-system
spec:
  interval: 30m
  chart:
    spec:
      chart: crossplane
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: crossplane
        namespace: flux-system
  install:
    createNamespace: false
