config:
  base_kustomize: manifests/k8s/overlays/dev
  port_forwards:
  - name: postgres
    serve_cmd: kubectl port-forward -n dbs deployment/postgres 5432:5432
    labels:
    - port-forward
    readiness:
      period_secs: 5
      exec_cmd: nc -z localhost 5432
  - name: redis
    serve_cmd: kubectl port-forward -n dbs deployment/redis 6379:6379
    labels:
    - port-forward
    readiness:
      period_secs: 5
      exec_cmd: nc -z localhost 6379
  - name: mailhog
    serve_cmd: kubectl port-forward -n dbs deployment/mailhog 8025:8025
    labels:
    - port-forward
    readiness:
      period_secs: 5
      exec_cmd: nc -z localhost 8025
  - name: istio-gateway
    serve_cmd: kubectl port-forward -n gateway svc/main-gateway-istio 8080:80 8443:443
    labels:
    - port-forward
    readiness:
      period_secs: 5
      exec_cmd: nc -z localhost 8080
  - name: kiali
    serve_cmd: kubectl port-forward -n istio-system svc/kiali 20001:20001
    labels:
    - port-forward
    readiness:
      period_secs: 5
      exec_cmd: nc -z localhost 20001
  local_tasks:
  - name: schema-configmap
    cmd: just gen-schema-configmap
    labels:
    - migrations
    deps:
    - manifests/db/schema.sql
    resource_deps: []
  - name: db-migrate
    cmd: echo "Running migrations..." && sqlx migrate run --source manifests/db/migrations --database-url "postgres://myuser:mypassword@localhost:5432/mydatabase?sslmode=disable" && echo "Applying seed data..." && kubectl exec -i -n dbs deployment/postgres -- psql -U myuser -d mydatabase < manifests/db/seed.sql && echo "Migrations + seed data applied!"
    labels:
    - migrations
    deps:
    - manifests/db/migrations
    - manifests/db/seed.sql
    resource_deps:
    - postgres
  shared_configs:
  - name: zerg-shared-config
    kustomize_path: apps/zerg/shared/k8s/kustomize/overlays/dev
    objects:
    - zerg-shared-config:configmap
    - zerg-shared-secrets:secret
    labels:
    - config
  rust_services:
  - name: zerg-api
    package_name: zerg_api
    image:
      name: yurikrupnik/zerg-api
      dockerfile: manifests/dockers/rust.Dockerfile
      target: rust
      build_args:
        APP_NAME: zerg_api
    app_path: apps/zerg/api
    kustomize_path: apps/zerg/api/k8s/kustomize/overlays/dev
    port_forwards:
    - local: 5221
      remote: 8080
    labels:
    - backend
    resource_deps:
    - zerg-tasks
    - zerg-shared-config
    live_update:
    - local_path: apps/zerg/api/src
      container_path: /app/apps/zerg/api/src
    only:
    - Cargo.toml
    - Cargo.lock
    - apps/
    - libs/
    ignore:
    - target/
    - '**/*.md'
    - '**/.git/'
    - '**/k8s/'
    - '**/Tiltfile'
    - apps/**/node_modules/
  - name: zerg-tasks
    package_name: zerg_tasks
    image:
      name: yurikrupnik/zerg-tasks
      dockerfile: manifests/dockers/rust.Dockerfile
      target: rust
      build_args:
        APP_NAME: zerg_tasks
    app_path: apps/zerg/tasks
    kustomize_path: apps/zerg/tasks/k8s/kustomize/overlays/dev
    port_forwards:
    - local: 50051
      remote: 50051
    labels:
    - backend
    resource_deps:
    - zerg-shared-config
    live_update:
    - local_path: apps/zerg/tasks/src
      container_path: /app/apps/zerg/tasks/src
    only:
    - Cargo.toml
    - Cargo.lock
    - apps/
    - libs/
    ignore:
    - target/
    - '**/*.md'
    - '**/.git/'
    - '**/k8s/'
    - '**/Tiltfile'
    - apps/**/node_modules/
  - name: zerg-email-nats
    package_name: zerg_email_nats
    image:
      name: yurikrupnik/zerg-email-nats
      dockerfile: manifests/dockers/rust.Dockerfile
      target: rust
      build_args:
        APP_NAME: zerg_email_nats
    app_path: apps/zerg/email-nats
    kustomize_path: apps/zerg/email-nats/k8s/kustomize/overlays/dev
    port_forwards: []
    labels:
    - backend
    resource_deps:
    - zerg-shared-config
    live_update:
    - local_path: apps/zerg/email-nats/src
      container_path: /app/apps/zerg/email-nats/src
    only:
    - Cargo.toml
    - Cargo.lock
    - apps/
    - libs/
    ignore:
    - target/
    - '**/*.md'
    - '**/.git/'
    - '**/k8s/'
    - '**/Tiltfile'
    - apps/**/node_modules/
  web_apps:
  - name: zerg-web
    build_cmd: bun nx run zerg-web:build
    dist_path: apps/zerg/web/dist
    app_path: apps/zerg/web
    image:
      name: yurikrupnik/zerg-web
      dockerfile: manifests/dockers/Dockerfile
      target: nginx
      build_args:
        DIST_PATH: apps/zerg/web/dist
    kustomize_path: apps/zerg/web/k8s/kustomize/overlays/dev
    port_forwards:
    - local: 5206
      remote: 8080
    labels:
    - bun
    resource_deps: []
    watch_paths:
    - apps/zerg/web/src
    - apps/zerg/web/project.json
    - apps/zerg/web/vite.config.ts
