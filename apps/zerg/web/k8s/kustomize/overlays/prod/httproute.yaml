apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: zerg-web
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway
      sectionName: https
  hostnames:
    - "zerg.${GATEWAY_SUFFIX}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: zerg-web
          port: 8080
