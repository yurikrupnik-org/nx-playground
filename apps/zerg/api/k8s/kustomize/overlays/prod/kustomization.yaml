apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: zerg

resources:
  - ../../base
  - external-secret.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: zerg-api-config
    literals:
      - PORT=8080
      - CORS_ALLOWED_ORIGIN=https://your-production-domain.com
      - REDIRECT_BASE_URL=https://api.your-production-domain.com
      - FRONTEND_URL=https://your-production-domain.com
      - OAUTH_AUTO_LINK_VERIFIED_EMAILS=false
      - FLAGSMITH_API_URL=http://flagsmith-api.flagsmith.svc.cluster.local:8000/api/v1
      - TASKS_SERVICE_ADDR=http://zerg-tasks:50051
      - RATE_LIMIT_REQUESTS_PER_WINDOW=200
      - RATE_LIMIT_WINDOW_SECS=60
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_VECTOR_REQUESTS_PER_WINDOW=40
      - RATE_LIMIT_VECTOR_WINDOW_SECS=60
      - RATE_LIMIT_AUTH_REQUESTS_PER_WINDOW=10
      - RATE_LIMIT_AUTH_WINDOW_SECS=60
