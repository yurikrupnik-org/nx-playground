apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: mongo-zerg-db-worker
  labels:
    app: mongo-zerg-db-worker
spec:
  scaleTargetRef:
    name: mongo-zerg-db-worker
  minReplicaCount: 0
  maxReplicaCount: 10
  pollingInterval: 5
  cooldownPeriod: 60
  triggers:
    - type: nats-jetstream
      metadata:
        natsServerMonitoringEndpoint: "nats.dbs.svc.cluster.local:8222"
        account: "$G"
        stream: "DB_TASKS_MONGO"
        consumer: "db-worker-mongo"
        lagThreshold: "10"
        activationLagThreshold: "1"
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 60
          policies:
            - type: Percent
              value: 50
              periodSeconds: 30
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Pods
              value: 5
              periodSeconds: 15
