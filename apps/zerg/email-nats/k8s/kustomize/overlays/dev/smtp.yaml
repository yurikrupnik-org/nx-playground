---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kompose.cmd: kompose convert --file manifests/dockers/compose.yaml --namespace dbs --stdout
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: mailhog
  name: mailhog
  namespace: dbs
spec:
  ports:
    - name: "1025"
      port: 1025
      targetPort: 1025
    - name: "8025"
      port: 8025
      targetPort: 8025
  selector:
    io.kompose.service: mailhog

---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert --file manifests/dockers/compose.yaml --namespace dbs --stdout
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: mailhog
  name: mailhog
  namespace: dbs
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: mailhog
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert --file manifests/dockers/compose.yaml --namespace dbs --stdout
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: mailhog
    spec:
      containers:
        - image: mailhog/mailhog
          name: mailhog
          ports:
            - containerPort: 1025
              protocol: TCP
            - containerPort: 8025
              protocol: TCP
      restartPolicy: Always
